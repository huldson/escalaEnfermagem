<html lang="pt-br">

<head>
    <title>Escala de Enfermagem</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#198754">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 mb-4">
                <div class="card shadow p-4">
                    <h4 class="text-center mb-4">Enfermeiros(a)</h4>
                    <div class="mb-3">
                        <label class="form-label">Nome Enfermeiro(a)</label>
                        <input type="text" id="nome" class="form-control" placeholder="Digite o nome">
                        <select id="nivel" class="form-select">
                            <option>Senior</option>
                            <option>Pleno</option>
                            <option>Junior</option>
                        </select>
                        <button class="btn btn-success w-100 mb-3" onclick="adicionarEnfermeiro()">Adicionar</button>
                        <h5 class="text-center mb-4">Enfermeiros cadastrados</h5>
                        <ul class="list-group" id="lista"></ul>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 mb-4">
                <div class="card shadow p-4">
                    <h4 class="text-center mb-4">Pacientes</h4>
                    <div class="mb-3">
                        <label class="form-label">Nome Paciente</label>
                        <input type="text" id="nomePaciente" class="form-control" placeholder="Digite o nome">
                        <label class="form-label">Acamado</label>
                        <select id="estado" class="form-select">
                            <option>Não Acamado</option>
                            <option>Acamado</option>
                        </select>
                        <button class="btn btn-success w-100 mb-3" onclick="adicionarPaciente()">Adicionar</button>
                        <h5 class="text-center mb-4">Pacientes cadastrados</h5>
                        <ul class="list-group" id="listaPacientes"></ul>
                    </div>
                </div>
            </div>
        </div>
        <button class="btn btn-success w-100 mb-4" onclick="processar()">
            Processar Escala
        </button>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card shadow p-4">
                    <h4 class="text-center">Resultado da Escala</h4>

                    <div id="resultadoEscala"></div>
                </div>
            </div>
        </div>
        <button class="btn btn-danger mt-3" onclick="gerarPDF()">
            📄 Baixar PDF
        </button>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

       <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

        <script src="codigo.js"></script>
</body>

</html>
